type Query {
    todos: [Todo!]!
    todosBySortOrder(order: SortOrder!): [Todo!]!
}

input NewTodo {
    text: String!
    userId: String!
}

input NewTodos {
    todos: [NewTodo!]!
}

type Mutation {
    createTodos(input: NewTodos!): TodoPage
}

type Todo {
    id: ID!
    text: String!
    userId: String!
    status: TodoStatus!
    unusedField: UnusedEnum
}

type TodoPage {
    todos: [Todo!]!
}

enum TodoStatus {
    OPEN
    DONE
}

enum SortOrder {
    ASC
    DESC
}

enum UnusedEnum {
    FOO
    BAR
}
