type Query {
    user(id: ID!): User!
    users: [User!]!
    post(id: ID!): Post!
}

type Mutation {
    createUser(input: CreateUserInput!): User!
    updatePost(id: ID!, input: UpdatePostInput!): Post!
}

input CreateUserInput {
    name: String!
    email: String!
}

input UpdatePostInput {
    title: String
    content: String
}

type User {
    id: ID!
    name: String!
    email: String!
    posts: [Post!]!
}

type Post {
    id: ID!
    title: String!
    content: String!
    author: User!
}
