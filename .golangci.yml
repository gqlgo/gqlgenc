version: "2"
linters:
  default: all
  disable:
    - contextcheck
    - cyclop # Cyclomatic complexity becomes very high when called from code generated by gqlgen, and it's difficult to resolve, so ignoring for now
    - dupl
    - dupword # Lint to detect redundant words, disabled as unnecessary
    - err113 # enable to define dynamic error variables
    - errorlint
    - errname # No need to restrict error variable names, so ignoring
    - exhaustive
    - exhaustruct
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gosec
    - interfacebloat # Lint to specify the upper limit of interface, disabled as unnecessary
    - ireturn # Returning interfaces results in errors, but it's not a problem, so ignoring
    - lll
    - maintidx # Disabled as cyclomatic etc. are unnecessary
    - makezero
    - mnd
    - modernize
    - musttag # Lint to require json tags, disabled as unnecessary
    - nestif
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - paralleltest
    - perfsprint
    - protogetter # Disabled because we don't use proto
    - recvcheck
    - revive
    - staticcheck
    - tagliatelle # JSON tag format is not unified across external APIs and gen files, so all would need to be excluded. Too many files to exclude, so ignoring for now
    - tagalign
    - testifylint
    - testpackage
    - tparallel
    - unused
    - varnamelen # No need to restrict variable name length, so disabled
    - wastedassign
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    depguard: # The file judgment is made against the absolute path, so you always need to put ** at the beginning.
      rules:
        gqlparserv1:
          deny:
            - pkg: ^github.com/vektah/gqlparser$
              desc: use github.com/vektah/gqlparser/v2
    errcheck:
      exclude-functions:
        - Write
        - Copy
        - WriteString
        - Render
    gomoddirectives:
      replace-local: true
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    nakedret:
      max-func-lines: 1
    unparam:
      check-exported: true
  exclusions:
    generated: strict # ignore // Code generated .* DO NOT EDIT\.$ file
    warn-unused: true
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - containedctx
          - forcetypeassert
        path: _test.go
      - linters:
          - govet
        path: graphqljson/graphql_test.go
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
        - pattern: 'a[b:len(a)]'
          replacement: 'a[b:]'
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/vektah/gqlparser)
        - prefix(github.com/99designs/gqlgen)
        - prefix(github.com/gqlgo/gqlgenc)
  exclusions:
    generated: strict # ignore // Code generated .* DO NOT EDIT\.$ file
    warn-unused: true
